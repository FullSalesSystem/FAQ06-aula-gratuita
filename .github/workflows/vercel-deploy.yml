name: Deploy to Vercel

on:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: npx vercel --token ${{ secrets.VERCEL_TOKEN }} --yes --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
